{% extends "base.html" %}

{% block content %}
    <h2>Favorites</h2>

    <div class="products">
        {% for p in items %}
            <div class="card">
                <img src="{{ p.image }}" alt="{{ p.title }}">
                <h3>{{ p.title }}</h3>
                <p><strong>Price:</strong> ${{ p.price }}</p>
                <p><strong>Category:</strong> {{ p.category }}</p>
                <a class="btn delete-btn" href="{{ url_for('delete_favorite', item_id=p.id) }}">Delete</a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
